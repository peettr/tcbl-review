<style>
/* Floating chat panel — appears near the 🐱 button */
#feifei-sidebar {
  position: fixed;
  width: 380px;
  height: 480px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.18);
  z-index: 10000;
  display: none;
  flex-direction: column;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  resize: both;
  min-width: 300px;
  min-height: 300px;
  max-width: 600px;
  max-height: 85vh;
}
#feifei-sidebar.open { display: flex; }

/* Feifei button inside TOC area */
#feifei-tab {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 10px 14px;
  margin-top: 16px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: white;
  font-size: 14px;
  font-weight: 500;
  box-shadow: 0 3px 12px rgba(102,126,234,0.3);
  overflow: visible;
  transition: box-shadow 0.2s, transform 0.15s;
}
#feifei-tab:hover {
  box-shadow: 0 4px 16px rgba(102,126,234,0.5);
  transform: translateY(-1px);
}
#feifei-tab .tab-icon { font-size: 20px; }

/* Header */
#feifei-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  cursor: grab;
  user-select: none;
}
#feifei-header:active { cursor: grabbing; }
#feifei-header .avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
#feifei-header .info { flex: 1; }
#feifei-header .name { font-weight: 600; font-size: 15px; }
#feifei-header .desc { font-size: 12px; opacity: 0.8; margin-top: 2px; }
#feifei-header .close-btn {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.7;
  padding: 4px 8px;
}
#feifei-header .close-btn:hover { opacity: 1; }

/* Messages */
#feifei-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ff-msg {
  max-width: 90%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}
.ff-msg.bot {
  background: #f0f2f5;
  color: #333;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.ff-msg.user {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.ff-msg p { margin: 0.3em 0; }
.ff-msg strong { font-weight: 600; }
.ff-typing {
  align-self: flex-start;
  padding: 10px 14px;
  background: #f0f2f5;
  border-radius: 14px;
  font-size: 14px;
  color: #999;
}
.ff-typing span { animation: blink 1.4s infinite both; }
.ff-typing span:nth-child(2) { animation-delay: 0.2s; }
.ff-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

/* Context quote */
.ff-context {
  background: #f8f0ff;
  border-left: 3px solid #764ba2;
  padding: 8px 12px;
  margin-bottom: 8px;
  font-size: 12px;
  color: #666;
  border-radius: 0 8px 8px 0;
  max-height: 60px;
  overflow: hidden;
}
.ff-context::before { content: '📎 选中内容：'; font-weight: 600; color: #764ba2; }

/* Input area */
#feifei-input-area {
  padding: 12px 16px;
  border-top: 1px solid #eee;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: white;
}
#feifei-input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#feifei-input:focus { border-color: #667eea; }
#feifei-send {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 50%;
  width: 38px;
  height: 38px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#feifei-send:hover { opacity: 0.9; }

/* Quick questions */
.ff-quick {
  padding: 8px 16px 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex-shrink: 0;
}
.ff-quick button {
  background: #f0f2f5;
  border: 1px solid #e0e0e0;
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 12px;
  color: #555;
  cursor: pointer;
  transition: all 0.15s;
}
.ff-quick button:hover {
  background: #667eea;
  color: white;
  border-color: #667eea;
}

/* Selection popup */
#feifei-select-popup {
  position: absolute;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 13px;
  cursor: pointer;
  z-index: 10002;
  display: none;
  box-shadow: 0 2px 10px rgba(102,126,234,0.4);
  white-space: nowrap;
}
#feifei-select-popup:hover { transform: scale(1.05); }

/* Mobile */
@media (max-width: 768px) {
  #feifei-sidebar { width: calc(100vw - 20px) !important; height: calc(100vh - 100px) !important; }
  #feifei-sidebar.open { left: 10px !important; top: 10px !important; }
}
</style>

    <div class="info">
      <div class="name">菲菲 Feifei</div>
      <div class="desc">TCBL Review Assistant</div>
    </div>
    <button class="close-btn" onclick="toggleFeifei()">✕</button>
  </div>
  <div id="feifei-messages">
    <div class="ff-msg bot">你好！我是菲菲～关于这篇TCBL综述有什么想聊的？可以选中文章中的文字直接问我哦！</div>
  </div>
  <div class="ff-quick">
    <button onclick="quickAsk('这篇综述主要讲什么？')">综述概要</button>
    <button onclick="quickAsk('KW01模型有什么特别的？')">KW01模型</button>
    <button onclick="quickAsk('Holland模型怎么用？')">Holland模型</button>
    <button onclick="quickAsk('PBWE框架是什么？')">PBWE框架</button>
  </div>
  <div id="feifei-input-area">
    <input id="feifei-input" type="text" placeholder="问我关于TCBL模型的问题..."
           onkeydown="if(event.key==='Enter')sendFeifei()">
    <button id="feifei-send" onclick="sendFeifei()">↑</button>
  </div>
</div>

<script>
const FEIFEI_API = 'https://feifei-tcbl.peettr.workers.dev';

// System prompt with full knowledge base is embedded in the Cloudflare Worker
const FEIFEI_SYSTEM = null; // handled server-side

let feifeiHistory = [];
let selectedText = '';

function toggleFeifei() {
  const sidebar = document.getElementById('feifei-sidebar');
  const btn = document.getElementById('feifei-tab');
  sidebar.classList.toggle('open');
  
  if (sidebar.classList.contains('open')) {
    // Position panel near the button
    const btnRect = btn.getBoundingClientRect();
    let left = btnRect.left - 390;
    let top = btnRect.top - 200;
    
    // Keep within viewport
    left = Math.max(10, Math.min(left, window.innerWidth - 400));
    top = Math.max(10, Math.min(top, window.innerHeight - 500));
    
    sidebar.style.left = left + 'px';
    sidebar.style.top = top + 'px';
    
    document.getElementById('feifei-input').focus();
  }
}

// Make chat panel draggable by header
(function() {
  let dragPanel = false, panelStartX, panelStartY, panelOrigX, panelOrigY;
  
  document.addEventListener('pointerdown', (e) => {
    if (e.target.closest('#feifei-header') && !e.target.closest('.close-btn')) {
      const sidebar = document.getElementById('feifei-sidebar');
      dragPanel = true;
      panelStartX = e.clientX;
      panelStartY = e.clientY;
      panelOrigX = sidebar.offsetLeft;
      panelOrigY = sidebar.offsetTop;
      sidebar.style.transition = 'none';
      e.preventDefault();
    }
  });
  
  document.addEventListener('pointermove', (e) => {
    if (!dragPanel) return;
    const sidebar = document.getElementById('feifei-sidebar');
    let newX = panelOrigX + (e.clientX - panelStartX);
    let newY = panelOrigY + (e.clientY - panelStartY);
    newX = Math.max(0, Math.min(newX, window.innerWidth - 100));
    newY = Math.max(0, Math.min(newY, window.innerHeight - 100));
    sidebar.style.left = newX + 'px';
    sidebar.style.top = newY + 'px';
  });
  
  document.addEventListener('pointerup', () => { dragPanel = false; });
})();

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `ff-msg ${role}`;
  div.innerHTML = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  document.getElementById('feifei-messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'ff-typing';
  div.id = 'ff-typing';
  div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  document.getElementById('feifei-messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function hideTyping() {
  const el = document.getElementById('ff-typing');
  if (el) el.remove();
}

function quickAsk(q) {
  document.getElementById('feifei-input').value = q;
  sendFeifei();
}

async function sendFeifei() {
  const input = document.getElementById('feifei-input');
  let text = input.value.trim();
  if (!text) return;

  input.value = '';
  
  // If there's selected text context, prepend it
  let userContent = text;
  if (selectedText) {
    const ctx = document.createElement('div');
    ctx.className = 'ff-context';
    ctx.textContent = selectedText.substring(0, 150);
    document.getElementById('feifei-messages').appendChild(ctx);
    userContent = `[用户选中了文章中这段文字: "${selectedText.substring(0, 500)}"]\n\n问题: ${text}`;
    selectedText = '';
  }
  
  addMsg('user', text);
  showTyping();
  
  feifeiHistory.push({ role: 'user', content: userContent });
  
  try {
    const resp = await fetch(FEIFEI_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        // system prompt is in the worker
        messages: feifeiHistory.slice(-10)
      })
    });
    
    const data = await resp.json();
    hideTyping();
    
    if (data.reply) {
      addMsg('bot', data.reply);
      feifeiHistory.push({ role: 'assistant', content: data.reply });
    } else {
      addMsg('bot', '喵...出了点小问题，稍后再试？🐱');
    }
  } catch (e) {
    hideTyping();
    addMsg('bot', '网络好像不太通 🐱');
  }
}

// Text selection → "Ask Feifei" popup
document.addEventListener('mouseup', (e) => {
  const popup = document.getElementById('feifei-select-popup');
  const sel = window.getSelection().toString().trim();
  
  if (sel.length > 10 && !e.target.closest('#feifei-sidebar')) {
    selectedText = sel;
    popup.style.display = 'block';
    popup.style.left = e.pageX + 'px';
    popup.style.top = (e.pageY - 40) + 'px';
  } else {
    popup.style.display = 'none';
  }
});

function askAboutSelection() {
  document.getElementById('feifei-select-popup').style.display = 'none';
  const sidebar = document.getElementById('feifei-sidebar');
  if (!sidebar.classList.contains('open')) {
    toggleFeifei();
  }
  document.getElementById('feifei-input').value = '请解释这段内容';
  document.getElementById('feifei-input').focus();
}

// Hide popup on scroll
document.addEventListener('scroll', () => {
  document.getElementById('feifei-select-popup').style.display = 'none';
});

  if (marginSidebar) {
    marginSidebar.appendChild(btn);
  } else {
    // No TOC sidebar: create a completely separate small floating button
    // Use a different ID to avoid CSS class conflicts
    btn.id = 'feifei-tab-float';
    btn.removeAttribute('class');
    const imgSrc = btn.querySelector('img') ? btn.querySelector('img').src : '';
    btn.innerHTML = imgSrc ? '<img src="' + imgSrc + '" style="width:40px;height:40px;border-radius:50%;">' : '🐱';
    btn.style.cssText = 'all:unset;position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:10001;background:linear-gradient(135deg,#667eea,#764ba2);cursor:pointer;box-shadow:0 3px 12px rgba(102,126,234,0.4);overflow:hidden;';
    document.body.appendChild(btn);
  }
  
  // Make it draggable
  let isDragging = false;
  let dragStarted = false;
  let startX, startY, origX, origY;
  
  function onPointerDown(e) {
    // Record start position
    isDragging = true;
    dragStarted = false;
    startX = e.clientX;
    startY = e.clientY;
    const rect = btn.getBoundingClientRect();
    origX = rect.left;
    origY = rect.top;
    e.preventDefault();
  }
  
  function onPointerMove(e) {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    
    // Only start dragging after 5px movement (avoid accidental drag on click)
    if (!dragStarted && Math.abs(dx) + Math.abs(dy) < 5) return;
    
    if (!dragStarted) {
      dragStarted = true;
      // Switch to fixed positioning for free movement
      btn.style.position = 'fixed';
      btn.style.left = origX + 'px';
      btn.style.top = origY + 'px';
      btn.style.margin = '0';
      btn.style.width = 'auto';
      btn.style.zIndex = '10001';
    }
    
    let newX = origX + dx;
    let newY = origY + dy;
    
    // Constrain to viewport
    newX = Math.max(0, Math.min(newX, window.innerWidth - btn.offsetWidth));
    newY = Math.max(0, Math.min(newY, window.innerHeight - btn.offsetHeight));
    
    btn.style.left = newX + 'px';
    btn.style.top = newY + 'px';
    btn.style.transform = 'none';
  }
  
  function onPointerUp(e) {
    if (!isDragging) return;
    isDragging = false;
    
    if (!dragStarted) {
      // It was a click, not a drag
      toggleFeifei();
    } else {
      // Save position
      localStorage.setItem('feifei-x', btn.style.left);
      localStorage.setItem('feifei-y', btn.style.top);
    }
  }
  
  btn.addEventListener('pointerdown', onPointerDown);
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
  btn.style.touchAction = 'none'; // prevent scroll while dragging
  
  // Restore saved position
  const savedX = localStorage.getItem('feifei-x');
  const savedY = localStorage.getItem('feifei-y');
  if (savedX && savedY) {
    btn.style.position = 'fixed';
    btn.style.left = savedX;
    btn.style.top = savedY;
    btn.style.margin = '0';
    btn.style.width = 'auto';
    btn.style.zIndex = '10001';
    btn.style.transform = 'none';
  }
}
