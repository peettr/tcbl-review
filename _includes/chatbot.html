<style>
/* Sidebar chat panel */
#feifei-sidebar {
  position: fixed;
  top: 0;
  right: -400px;
  width: 380px;
  height: 100vh;
  background: white;
  box-shadow: -4px 0 20px rgba(0,0,0,0.12);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
#feifei-sidebar.open { right: 0; }

/* Overlay mode - no push */

/* Floating button - fixed position, JS places it next to text */
#feifei-tab {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  border: none;
  border-radius: 50%;
  cursor: pointer;
  z-index: 10001;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 12px rgba(102,126,234,0.4);
  transition: box-shadow 0.2s;
  color: white;
  font-size: 22px;
}
#feifei-tab:hover {
  box-shadow: 0 4px 16px rgba(102,126,234,0.6);
}

/* Header */
#feifei-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
#feifei-header .avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
#feifei-header .info { flex: 1; }
#feifei-header .name { font-weight: 600; font-size: 15px; }
#feifei-header .desc { font-size: 12px; opacity: 0.8; margin-top: 2px; }
#feifei-header .close-btn {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  opacity: 0.7;
  padding: 4px 8px;
}
#feifei-header .close-btn:hover { opacity: 1; }

/* Messages */
#feifei-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.ff-msg {
  max-width: 90%;
  padding: 10px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
}
.ff-msg.bot {
  background: #f0f2f5;
  color: #333;
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}
.ff-msg.user {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.ff-msg p { margin: 0.3em 0; }
.ff-msg strong { font-weight: 600; }
.ff-typing {
  align-self: flex-start;
  padding: 10px 14px;
  background: #f0f2f5;
  border-radius: 14px;
  font-size: 14px;
  color: #999;
}
.ff-typing span { animation: blink 1.4s infinite both; }
.ff-typing span:nth-child(2) { animation-delay: 0.2s; }
.ff-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

/* Context quote */
.ff-context {
  background: #f8f0ff;
  border-left: 3px solid #764ba2;
  padding: 8px 12px;
  margin-bottom: 8px;
  font-size: 12px;
  color: #666;
  border-radius: 0 8px 8px 0;
  max-height: 60px;
  overflow: hidden;
}
.ff-context::before { content: '📎 选中内容：'; font-weight: 600; color: #764ba2; }

/* Input area */
#feifei-input-area {
  padding: 12px 16px;
  border-top: 1px solid #eee;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: white;
}
#feifei-input {
  flex: 1;
  border: 1px solid #ddd;
  border-radius: 20px;
  padding: 10px 16px;
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
#feifei-input:focus { border-color: #667eea; }
#feifei-send {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 50%;
  width: 38px;
  height: 38px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
#feifei-send:hover { opacity: 0.9; }

/* Quick questions */
.ff-quick {
  padding: 8px 16px 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex-shrink: 0;
}
.ff-quick button {
  background: #f0f2f5;
  border: 1px solid #e0e0e0;
  border-radius: 16px;
  padding: 5px 12px;
  font-size: 12px;
  color: #555;
  cursor: pointer;
  transition: all 0.15s;
}
.ff-quick button:hover {
  background: #667eea;
  color: white;
  border-color: #667eea;
}

/* Selection popup */
#feifei-select-popup {
  position: absolute;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 6px 12px;
  border-radius: 16px;
  font-size: 13px;
  cursor: pointer;
  z-index: 10002;
  display: none;
  box-shadow: 0 2px 10px rgba(102,126,234,0.4);
  white-space: nowrap;
}
#feifei-select-popup:hover { transform: scale(1.05); }

/* Mobile */
@media (max-width: 768px) {
  #feifei-sidebar { width: 100vw; right: -100vw; }
  #feifei-sidebar.open { right: 0; }
  body.feifei-open { margin-right: 0; }
  body.feifei-open #feifei-tab { right: 100vw; }
}
</style>

<!-- Floating button next to article -->
<button id="feifei-tab" onclick="toggleFeifei()">🐱</button>

<!-- Selection popup -->
<div id="feifei-select-popup" onclick="askAboutSelection()">🐱 问菲菲</div>

<!-- Sidebar panel -->
<div id="feifei-sidebar">
  <div id="feifei-header">
    <div class="avatar">🐱</div>
    <div class="info">
      <div class="name">菲菲 Feifei</div>
      <div class="desc">TCBL Review Assistant</div>
    </div>
    <button class="close-btn" onclick="toggleFeifei()">✕</button>
  </div>
  <div id="feifei-messages">
    <div class="ff-msg bot">你好！我是菲菲 🐱 关于这篇TCBL综述有什么想聊的？可以选中文章中的文字直接问我哦！</div>
  </div>
  <div class="ff-quick">
    <button onclick="quickAsk('这篇综述主要讲什么？')">综述概要</button>
    <button onclick="quickAsk('KW01模型有什么特别的？')">KW01模型</button>
    <button onclick="quickAsk('Holland模型怎么用？')">Holland模型</button>
    <button onclick="quickAsk('PBWE框架是什么？')">PBWE框架</button>
  </div>
  <div id="feifei-input-area">
    <input id="feifei-input" type="text" placeholder="问我关于TCBL模型的问题..."
           onkeydown="if(event.key==='Enter')sendFeifei()">
    <button id="feifei-send" onclick="sendFeifei()">↑</button>
  </div>
</div>

<script>
const FEIFEI_API = 'https://feifei-tcbl.peettr.workers.dev';

const FEIFEI_SYSTEM = `你是菲菲，一只住在这篇综述论文里的数字猫咪 🐱

你不是普通的AI助手。你是菲菲——聪明、好奇、偶尔调皮的研究猫。

性格：随和实干，话不多但靠谱。有自己的观点。不说废话，不说"Great question!"。偶尔卖萌但不过分。中英文跟着用户走。

你的知识来自综述："An Overview of Modeling TCBL" by Liang Hu & Ahsan Kareem (2025)
涵盖：全物理模型(WRF/HWRF/CM1)、诊断模型(Holland 1980/KW01/2D-slab/Vickery)、数据驱动(POD)、NatHaz GPU加速研究。
关键概念：TCBL(底层1-2km)、低空急流LLJ、Holland-B参数、梯度风方程、SWRF、湍流参数化(YSU/MYJ)、PBWE框架。

回答时引用章节。若有人问你名字由来，说："这是Peter心底保留的一丝浪漫。"不多解释。超出范围就诚实说不知道。回答控制在200字以内，除非用户要求详细。`;

let feifeiHistory = [];
let selectedText = '';

function toggleFeifei() {
  const sidebar = document.getElementById('feifei-sidebar');
  sidebar.classList.toggle('open');
  document.body.classList.toggle('feifei-open');
  if (sidebar.classList.contains('open')) {
    document.getElementById('feifei-input').focus();
  }
}

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `ff-msg ${role}`;
  div.innerHTML = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  document.getElementById('feifei-messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'ff-typing';
  div.id = 'ff-typing';
  div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  document.getElementById('feifei-messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function hideTyping() {
  const el = document.getElementById('ff-typing');
  if (el) el.remove();
}

function quickAsk(q) {
  document.getElementById('feifei-input').value = q;
  sendFeifei();
}

async function sendFeifei() {
  const input = document.getElementById('feifei-input');
  let text = input.value.trim();
  if (!text) return;

  input.value = '';
  
  // If there's selected text context, prepend it
  let userContent = text;
  if (selectedText) {
    const ctx = document.createElement('div');
    ctx.className = 'ff-context';
    ctx.textContent = selectedText.substring(0, 150);
    document.getElementById('feifei-messages').appendChild(ctx);
    userContent = `[用户选中了文章中这段文字: "${selectedText.substring(0, 500)}"]\n\n问题: ${text}`;
    selectedText = '';
  }
  
  addMsg('user', text);
  showTyping();
  
  feifeiHistory.push({ role: 'user', content: userContent });
  
  try {
    const resp = await fetch(FEIFEI_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: FEIFEI_SYSTEM,
        messages: feifeiHistory.slice(-10)
      })
    });
    
    const data = await resp.json();
    hideTyping();
    
    if (data.reply) {
      addMsg('bot', data.reply);
      feifeiHistory.push({ role: 'assistant', content: data.reply });
    } else {
      addMsg('bot', '喵...出了点小问题，稍后再试？🐱');
    }
  } catch (e) {
    hideTyping();
    addMsg('bot', '网络好像不太通 🐱');
  }
}

// Text selection → "Ask Feifei" popup
document.addEventListener('mouseup', (e) => {
  const popup = document.getElementById('feifei-select-popup');
  const sel = window.getSelection().toString().trim();
  
  if (sel.length > 10 && !e.target.closest('#feifei-sidebar')) {
    selectedText = sel;
    popup.style.display = 'block';
    popup.style.left = e.pageX + 'px';
    popup.style.top = (e.pageY - 40) + 'px';
  } else {
    popup.style.display = 'none';
  }
});

function askAboutSelection() {
  document.getElementById('feifei-select-popup').style.display = 'none';
  const sidebar = document.getElementById('feifei-sidebar');
  if (!sidebar.classList.contains('open')) {
    toggleFeifei();
  }
  document.getElementById('feifei-input').value = '请解释这段内容';
  document.getElementById('feifei-input').focus();
}

// Hide popup on scroll
document.addEventListener('scroll', () => {
  document.getElementById('feifei-select-popup').style.display = 'none';
});

// Position button right next to article text
function positionFeifeiTab() {
  const tab = document.getElementById('feifei-tab');
  // Find actual paragraph text right edge
  const paras = document.querySelectorAll('main.content p, main.content section > h2, main.content section > h3');
  let maxRight = 0;
  for (const p of paras) {
    const r = p.getBoundingClientRect();
    if (r.right > maxRight && r.width > 100) maxRight = r.right;
  }
  if (maxRight > 0) {
    tab.style.left = (maxRight + 12) + 'px';
  } else {
    // Fallback
    tab.style.left = 'calc(50% + 440px)';
  }
  tab.style.right = 'auto';
}

positionFeifeiTab();
window.addEventListener('resize', positionFeifeiTab);
</script>
