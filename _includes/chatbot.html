    <button class="close-btn" onclick="toggleFeifei()">✕</button>

<script>
const FEIFEI_API = 'https://feifei-tcbl.peettr.workers.dev';
const isZhPage = window.location.pathname.includes('index-zh');
const feifeiI18n = {
  popupLabel: isZhPage ? '问菲菲' : 'Ask Feifei',
  explainSelection: isZhPage ? '请解释这段内容' : 'Please explain the selected text',
  inputPlaceholder: isZhPage ? '问菲菲...' : 'Ask Feifei about TCBL...',
  greeting: isZhPage
    ? '你好！我是菲菲 Feifei～ 你可以问我关于这篇综述的任何问题，也可以直接选中文章中的文字来问我哦！'
    : 'Hi! I\'m Feifei \u{1F431} Ask me anything about this TCBL review. You can also select text in the article to ask me!',
  btnLabel: isZhPage ? '问菲菲 Ask Feifei' : 'Ask Feifei 问菲菲',
  quickOverviewLabel: isZhPage ? '综述概要' : 'Overview',
  quickOverviewQ: isZhPage ? '这篇综述主要讲什么？' : 'What is this review about?',
  quickKW01Label: isZhPage ? 'KW01模型' : 'KW01 model',
  quickKW01Q: isZhPage ? 'KW01模型有什么特别的？' : 'What is special about the KW01 model?',
};

// System prompt with full knowledge base is embedded in the Cloudflare Worker
const FEIFEI_SYSTEM = null; // handled server-side

let feifeiHistory = [];
let selectedText = '';

function toggleFeifei() {
  const sidebar = document.getElementById('feifei-sidebar');
  const btn = document.getElementById('feifei-tab-float');
  sidebar.classList.toggle('open');
  
  if (sidebar.classList.contains('open')) {
    let left = window.innerWidth - 404;
    let top = window.innerHeight - 504;
    
    if (btn) {
      const btnRect = btn.getBoundingClientRect();
      // Open below the floating button with a small gap, aligned to its left edge
      left = btnRect.left;
      top = btnRect.bottom + 12;
    }
    
    // Keep within viewport
    left = Math.max(10, Math.min(left, window.innerWidth - 390));
    top = Math.max(10, Math.min(top, window.innerHeight - 490));
    
    sidebar.style.left = left + 'px';
    sidebar.style.top = top + 'px';
    
    document.getElementById('feifei-input').focus();
  }
}

// Make chat panel draggable by header
(function() {
  let dragPanel = false, panelStartX, panelStartY, panelOrigX, panelOrigY;
  
  document.addEventListener('pointerdown', (e) => {
    if (window.innerWidth <= 768) return; // No drag on mobile
    if (e.target.closest('#feifei-header') && !e.target.closest('.close-btn')) {
      const sidebar = document.getElementById('feifei-sidebar');
      dragPanel = true;
      panelStartX = e.clientX;
      panelStartY = e.clientY;
      panelOrigX = sidebar.offsetLeft;
      panelOrigY = sidebar.offsetTop;
      sidebar.style.transition = 'none';
      e.preventDefault();
    }
  });
  
  document.addEventListener('pointermove', (e) => {
    if (!dragPanel) return;
    const sidebar = document.getElementById('feifei-sidebar');
    let newX = panelOrigX + (e.clientX - panelStartX);
    let newY = panelOrigY + (e.clientY - panelStartY);
    newX = Math.max(0, Math.min(newX, window.innerWidth - 100));
    newY = Math.max(0, Math.min(newY, window.innerHeight - 100));
    sidebar.style.left = newX + 'px';
    sidebar.style.top = newY + 'px';
  });
  
  document.addEventListener('pointerup', () => { dragPanel = false; });
})();

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `ff-msg ${role}`;
  div.innerHTML = text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  document.getElementById('feifei-messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'ff-typing';
  div.id = 'ff-typing';
  div.innerHTML = '<span>●</span><span>●</span><span>●</span>';
  document.getElementById('feifei-messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function hideTyping() {
  const el = document.getElementById('ff-typing');
  if (el) el.remove();
}

function quickAsk(q) {
  document.getElementById('feifei-input').value = q;
  sendFeifei();
}

async function sendFeifei() {
  const input = document.getElementById('feifei-input');
  let text = input.value.trim();
  if (!text) return;

  input.value = '';
  
  // If there's selected text context, prepend it
  let userContent = text;
  if (selectedText) {
    const ctx = document.createElement('div');
    ctx.className = 'ff-context';
    ctx.textContent = selectedText.substring(0, 150);
    document.getElementById('feifei-messages').appendChild(ctx);
    userContent = `[用户选中了文章中这段文字: "${selectedText.substring(0, 500)}"]\n\n问题: ${text}`;
    selectedText = '';
  }
  
  addMsg('user', text);
  showTyping();
  
  feifeiHistory.push({ role: 'user', content: userContent });
  
  try {
    const resp = await fetch(FEIFEI_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        // system prompt is in the worker
        messages: feifeiHistory.slice(-10)
      })
    });
    
    const data = await resp.json();
    hideTyping();
    
    if (data.reply) {
      addMsg('bot', data.reply);
      feifeiHistory.push({ role: 'assistant', content: data.reply });
    } else {
      addMsg('bot', '喵... something went wrong. 稍后再试一下？🐱');
    }
  } catch (e) {
    hideTyping();
    addMsg('bot', 'Network seems busy... 网络好像不太通 🐱');
  }
}

// Text selection → "Ask Feifei" popup
function showSelectionPopup(e) {
  const popup = document.getElementById('feifei-select-popup');
  const sel = window.getSelection().toString().trim();
  
  if (sel.length > 10 && !e.target.closest('#feifei-sidebar')) {
    selectedText = sel;
    popup.style.display = 'block';
    // Use touch position or mouse position
    const px = e.pageX || (e.changedTouches && e.changedTouches[0].pageX) || 0;
    const py = e.pageY || (e.changedTouches && e.changedTouches[0].pageY) || 0;
    popup.style.left = px + 'px';
    popup.style.top = (py - 40) + 'px';
  } else {
    popup.style.display = 'none';
  }
}
document.addEventListener('mouseup', showSelectionPopup);
// Mobile: use selectionchange with a short delay to catch touch selections
document.addEventListener('selectionchange', (() => {
  let timer = null;
  return () => {
    if (window.innerWidth > 768) return;
    clearTimeout(timer);
    timer = setTimeout(() => {
      const sel = window.getSelection();
      const text = sel.toString().trim();
      const popup = document.getElementById('feifei-select-popup');
      if (text.length > 10) {
        selectedText = text;
        // Position near the selection
        const range = sel.getRangeAt(0);
        const rect = range.getBoundingClientRect();
        popup.style.display = 'block';
        popup.style.left = (rect.left + window.scrollX) + 'px';
        popup.style.top = (rect.top + window.scrollY - 40) + 'px';
      } else {
        popup.style.display = 'none';
      }
    }, 300);
  };
})());

function askAboutSelection() {
  document.getElementById('feifei-select-popup').style.display = 'none';
  const sidebar = document.getElementById('feifei-sidebar');
  if (!sidebar.classList.contains('open')) {
    toggleFeifei();
  }
  document.getElementById('feifei-input').value = feifeiI18n.explainSelection;
  document.getElementById('feifei-input').focus();
}

// Hide popup on scroll
document.addEventListener('scroll', () => {
  document.getElementById('feifei-select-popup').style.display = 'none';
});

// Inject draggable floating button (always fixed-position, never inside sidebar)
function injectFeifeiTab() {
  const existing = document.getElementById('feifei-tab-float');
  if (existing) existing.remove();

  const btn = document.createElement('button');
  btn.id = 'feifei-tab-float';
  btn.type = 'button';
  btn.setAttribute('aria-label', feifeiI18n.btnLabel);
  const avatarSrc = 'images/feifei-avatar.jpg';
  btn.innerHTML = '<span class="ff-avatar-wrap"><img src="' + avatarSrc + '" alt="菲菲"></span><span class="ff-tab-label">' + feifeiI18n.btnLabel + '</span>';
  document.body.appendChild(btn);

  let isDragging = false;
  let dragStarted = false;
  let startX = 0, startY = 0, origX = 0, origY = 0;

  function isMobile() { return window.innerWidth <= 768; }

  btn.addEventListener('click', (e) => {
    if (isMobile()) toggleFeifei();
  });

  function onPointerDown(e) {
    if (isMobile()) return; // No drag on mobile
    isDragging = true;
    dragStarted = false;
    startX = e.clientX;
    startY = e.clientY;
    const rect = btn.getBoundingClientRect();
    origX = rect.left;
    origY = rect.top;
    btn.setPointerCapture?.(e.pointerId);
    e.preventDefault();
  }

  function onPointerMove(e) {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (!dragStarted && Math.abs(dx) + Math.abs(dy) < 5) return;
    if (!dragStarted) dragStarted = true;

    let newX = origX + dx;
    let newY = origY + dy;
    newX = Math.max(0, Math.min(newX, window.innerWidth - btn.offsetWidth));
    newY = Math.max(0, Math.min(newY, window.innerHeight - btn.offsetHeight));

    btn.style.right = 'auto';
    btn.style.bottom = 'auto';
    btn.style.left = newX + 'px';
    btn.style.top = newY + 'px';
    btn.style.transform = 'none';
  }

  function onPointerUp(e) {
    if (!isDragging) return;
    isDragging = false;
    btn.releasePointerCapture?.(e.pointerId);

    if (!dragStarted) {
      toggleFeifei();
      return;
    }

    localStorage.setItem('feifei-x', btn.style.left || '');
    localStorage.setItem('feifei-y', btn.style.top || '');
  }

  btn.addEventListener('pointerdown', onPointerDown);
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup', onPointerUp);
  btn.style.touchAction = 'none';

  // Restore saved position only on desktop
  if (!isMobile()) {
    const savedX = localStorage.getItem('feifei-x');
    const savedY = localStorage.getItem('feifei-y');
    if (savedX && savedY) {
      btn.style.right = 'auto';
      btn.style.bottom = 'auto';
      btn.style.left = savedX;
      btn.style.top = savedY;
      btn.style.transform = 'none';
    }
  }
}

injectFeifeiTab();

// Initialize bilingual text
document.getElementById('popup-label').textContent = feifeiI18n.popupLabel;
document.getElementById('feifei-greeting').textContent = feifeiI18n.greeting;
document.getElementById('feifei-input').placeholder = feifeiI18n.inputPlaceholder;
var qOverview = document.getElementById('quick-overview');
qOverview.textContent = feifeiI18n.quickOverviewLabel;
qOverview.onclick = function() { quickAsk(feifeiI18n.quickOverviewQ); };
var qKw01 = document.getElementById('quick-kw01');
qKw01.textContent = feifeiI18n.quickKW01Label;
qKw01.onclick = function() { quickAsk(feifeiI18n.quickKW01Q); };
</script>
