<style>
/* Comment button next to headings */
.comment-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 8px;
  padding: 2px 8px;
  font-size: 13px;
  color: #888;
  background: none;
  border: 1px solid #ddd;
  border-radius: 12px;
  cursor: pointer;
  vertical-align: middle;
  transition: all 0.2s;
}
.comment-btn:hover { color: #6b4c9a; border-color: #6b4c9a; }
.comment-btn .count { font-weight: 600; color: #6b4c9a; }

/* Comment panel */
#comment-panel {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 380px;
  max-height: 500px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  z-index: 10001;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
#comment-panel.open { display: flex; }

#comment-panel-header {
  padding: 12px 16px;
  background: #6b4c9a;
  color: white;
  font-weight: 600;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#comment-panel-header .close-btn {
  background: none; border: none; color: white;
  font-size: 18px; cursor: pointer; padding: 0 4px;
}

#comment-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px;
  max-height: 300px;
}

.comment-item {
  padding: 10px 0;
  border-bottom: 1px solid #f0f0f0;
}
.comment-item:last-child { border-bottom: none; }
.comment-meta {
  font-size: 12px;
  color: #999;
  margin-bottom: 4px;
}
.comment-meta .comment-author { font-weight: 600; color: #333; }
.comment-text {
  font-size: 14px;
  color: #333;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.no-comments {
  color: #999;
  font-size: 13px;
  text-align: center;
  padding: 20px 0;
}

#comment-form {
  padding: 12px 16px;
  border-top: 1px solid #eee;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
#comment-form input, #comment-form textarea {
  border: 1px solid #ddd;
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
}
#comment-form input:focus, #comment-form textarea:focus {
  border-color: #6b4c9a;
}
#comment-form textarea {
  resize: vertical;
  min-height: 60px;
}
#comment-submit {
  align-self: flex-end;
  background: #6b4c9a;
  color: white;
  border: none;
  border-radius: 6px;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
}
#comment-submit:hover { background: #5a3d87; }
#comment-submit:disabled { opacity: 0.5; cursor: not-allowed; }

@media (max-width: 768px) {
  #comment-panel {
    width: calc(100vw - 20px);
    right: 10px;
    bottom: 10px;
  }
}
</style>

<div id="comment-panel">
  <div id="comment-panel-header">
    <span id="comment-section-title">💬 评论</span>
    <button class="close-btn" onclick="closeCommentPanel()">✕</button>
  </div>
  <div id="comment-list"></div>
  <div id="comment-form">
    <input type="text" id="comment-name" placeholder="昵称（可选，默认匿名）" maxlength="30">
    <textarea id="comment-text" placeholder="写下你的评论..." maxlength="2000"></textarea>
    <button id="comment-submit" onclick="submitComment()">发送</button>
  </div>
</div>

<script>
const COMMENT_API = 'https://feifei-tcbl.peettr.workers.dev/comments';
let currentSection = '_global';
let commentCounts = {};

document.addEventListener('DOMContentLoaded', () => {
  // Add comment buttons to all section headings (h2-h6)
  const headings = document.querySelectorAll('main h2[data-anchor-id], main h3[data-anchor-id], main h4[data-anchor-id], main h5[data-anchor-id], main h6[data-anchor-id], main h2[id], main h3[id], main h4[id], main h5[id], main h6[id]');
  headings.forEach(h => {
    const sectionId = h.getAttribute('data-anchor-id') || h.id;
    if (!sectionId || sectionId === 'toc-title') return;
    const btn = document.createElement('button');
    btn.className = 'comment-btn';
    btn.innerHTML = '💬 <span class="count" data-section="' + sectionId + '">0</span>';
    btn.onclick = (e) => { e.preventDefault(); openCommentPanel(sectionId, h.textContent.replace(/💬\s*\d*/, '').trim()); };
    h.appendChild(btn);
  });

  // Add a global comment button at end
  const article = document.querySelector('main #quarto-document-content') || document.querySelector('main');
  if (article) {
    const globalDiv = document.createElement('div');
    globalDiv.style.cssText = 'margin: 40px 0; text-align: center;';
    globalDiv.innerHTML = '<button class="comment-btn" style="font-size:15px; padding:6px 16px;" onclick="openCommentPanel(\'_global\', \'全文评论\')">💬 留下你的评论</button>';
    article.appendChild(globalDiv);
  }

  // Load comment counts
  loadCommentCounts();
});

async function loadCommentCounts() {
  try {
    const sections = document.querySelectorAll('.comment-btn .count');
    for (const span of sections) {
      const section = span.dataset.section;
      const resp = await fetch(COMMENT_API + '?section=' + encodeURIComponent(section));
      const data = await resp.json();
      if (data.length > 0) {
        span.textContent = data.length;
      }
    }
  } catch (e) { /* silent */ }
}

async function openCommentPanel(section, title) {
  currentSection = section;
  document.getElementById('comment-section-title').textContent = '💬 ' + title;
  document.getElementById('comment-panel').classList.add('open');
  document.getElementById('comment-text').value = '';
  await loadComments(section);
}

function closeCommentPanel() {
  document.getElementById('comment-panel').classList.remove('open');
}

async function loadComments(section) {
  const list = document.getElementById('comment-list');
  list.innerHTML = '<div class="no-comments">加载中...</div>';
  try {
    const resp = await fetch(COMMENT_API + '?section=' + encodeURIComponent(section));
    const comments = await resp.json();
    if (comments.length === 0) {
      list.innerHTML = '<div class="no-comments">还没有评论，来留下第一条吧！</div>';
      return;
    }
    list.innerHTML = comments.map(c => `
      <div class="comment-item">
        <div class="comment-meta">
          <span class="comment-author">${escapeHtml(c.name)}</span>
          · ${formatTime(c.time)}
        </div>
        <div class="comment-text">${escapeHtml(c.text)}</div>
      </div>
    `).join('');
    list.scrollTop = list.scrollHeight;
  } catch (e) {
    list.innerHTML = '<div class="no-comments">加载失败</div>';
  }
}

async function submitComment() {
  const text = document.getElementById('comment-text').value.trim();
  if (!text) return;
  const name = document.getElementById('comment-name').value.trim();
  const btn = document.getElementById('comment-submit');
  btn.disabled = true;
  btn.textContent = '发送中...';
  try {
    await fetch(COMMENT_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ section: currentSection, text, name }),
    });
    document.getElementById('comment-text').value = '';
    await loadComments(currentSection);
    // Update count
    const countSpan = document.querySelector('.count[data-section="' + currentSection + '"]');
    if (countSpan) {
      countSpan.textContent = parseInt(countSpan.textContent || '0') + 1;
    }
  } catch (e) {
    alert('发送失败，请重试');
  }
  btn.disabled = false;
  btn.textContent = '发送';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  if (diff < 604800) return Math.floor(diff/86400) + '天前';
  return d.toLocaleDateString('zh-CN');
}
</script>
