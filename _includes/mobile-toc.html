<style>
@media (min-width: 769px) {
  #mobile-toc-btn, #mobile-toc-panel, #mobile-toc-backdrop { display: none !important; }
}

#mobile-toc-btn {
  position: fixed;
  top: calc(env(safe-area-inset-top, 0px) + 56px);
  left: 8px;
  z-index: 99997;
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 50%;
  background: rgba(60, 60, 60, 0.8);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  line-height: 1;
}
#mobile-toc-btn:active {
  background: rgba(40, 40, 40, 0.95);
}

#mobile-toc-panel {
  position: fixed;
  top: 0;
  left: 0;
  width: 80vw;
  max-width: 300px;
  height: 100vh;
  height: 100dvh;
  background: #fff;
  z-index: 100000;
  box-shadow: 4px 0 20px rgba(0,0,0,0.2);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px 32px;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
#mobile-toc-panel.open {
  transform: translateX(0);
}
#mobile-toc-panel .toc-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #eee;
}
#mobile-toc-panel .toc-header span {
  font-size: 15px;
  font-weight: 600;
  color: #333;
}
#mobile-toc-panel .toc-close {
  width: 28px;
  height: 28px;
  border: none;
  background: #f0f0f0;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
}
#mobile-toc-panel .toc-list {
  list-style: none;
  padding: 0;
  margin: 0;
}
#mobile-toc-panel .toc-list a {
  display: block;
  padding: 7px 0;
  color: #444;
  text-decoration: none;
  font-size: 13px;
  border-bottom: 1px solid #f5f5f5;
}
#mobile-toc-panel .toc-list a:active { color: #667eea; }
#mobile-toc-panel .toc-list .toc-h1 { padding-left: 0; font-weight: 700; font-size: 15px; color: #222; }
#mobile-toc-panel .toc-list .toc-h2 { padding-left: 12px; font-weight: 600; font-size: 14px; }
#mobile-toc-panel .toc-list .toc-h3 { padding-left: 14px; }
#mobile-toc-panel .toc-list .toc-h4 { padding-left: 28px; font-size: 12px; color: #888; }

#mobile-toc-backdrop {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 99999;
  display: none;
}
#mobile-toc-backdrop.open { display: block; }

[data-bs-theme="dark"] #mobile-toc-panel { background: #1e1e2e; }
[data-bs-theme="dark"] #mobile-toc-panel .toc-header span { color: #ddd; }
[data-bs-theme="dark"] #mobile-toc-panel .toc-header { border-bottom-color: #333; }
[data-bs-theme="dark"] #mobile-toc-panel .toc-close { background: #333; color: #ccc; }
[data-bs-theme="dark"] #mobile-toc-panel .toc-list a { color: #ccc; border-bottom-color: #2a2a3a; }
</style>

<script>
function initMobileToc() {
  const path = window.location.pathname;
  const isArticle = path.endsWith('/') || path.endsWith('/index.html') || path.includes('index-en') || path.endsWith('/tcbl-review/');
  if (!isArticle) return;

  // Quarto: h2+ have data-anchor-id, h1 have no id but parent section has id
  const headings = document.querySelectorAll('section[id] > h1, h2[data-anchor-id], h3[data-anchor-id], h4[data-anchor-id]');
  if (headings.length < 3) return;

  const btn = document.createElement('button');
  btn.id = 'mobile-toc-btn';
  btn.innerHTML = '☰';
  document.body.appendChild(btn);

  const backdrop = document.createElement('div');
  backdrop.id = 'mobile-toc-backdrop';
  document.body.appendChild(backdrop);

  const panel = document.createElement('div');
  panel.id = 'mobile-toc-panel';
  let html = '<div class="toc-header"><span>目录 Contents</span><button class="toc-close" id="mobile-toc-close">✕</button></div><ul class="toc-list">';
  headings.forEach(h => {
    const level = h.tagName.toLowerCase();
    // Clean up text (remove edit/comment buttons)
    let text = h.textContent.replace(/[#§¶✏️💬]/g, '').replace(/\d+$/,'').trim();
    if (!text || text.length < 2) return;
    // h1: use parent section id; h2+: use data-anchor-id
    const anchor = h.getAttribute('data-anchor-id') || h.id || (h.parentElement && h.parentElement.id) || '';
    if (!anchor) return;
    html += '<li><a href="#' + anchor + '" class="toc-' + level + '">' + text + '</a></li>';
  });
  html += '</ul>';
  panel.innerHTML = html;
  document.body.appendChild(panel);

  function openToc() {
    panel.classList.add('open');
    backdrop.classList.add('open');
  }
  function closeToc() {
    panel.classList.remove('open');
    backdrop.classList.remove('open');
  }
  btn.addEventListener('click', openToc);
  backdrop.addEventListener('click', closeToc);
  document.getElementById('mobile-toc-close').addEventListener('click', closeToc);
  panel.querySelectorAll('.toc-list a').forEach(a => {
    a.addEventListener('click', closeToc);
  });
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initMobileToc);
} else {
  initMobileToc();
}
</script>
