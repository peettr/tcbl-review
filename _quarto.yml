project:
  type: website
  output-dir: _site
  resources:
    - citation_network.json
    - presentations/
    - images/feifei-avatar.jpg
  render:
    - index.qmd
    - mindmap.qmd
    - literature.qmd
    - slides.qmd
    - index-zh.qmd
    - network.qmd
    - presentations.qmd

website:
  title: "TCBL Review — An Interactive Publication"
  repo-url: https://github.com/peettr/tcbl-review
  repo-actions: [edit, issue]
  repo-branch: main
  navbar:
    left:
      - text: "Article"
        menu:
          - text: "English"
            href: index.qmd
          - text: "中文"
            href: index-zh.qmd
      - text: "Mind Map"
        href: mindmap.qmd
      - text: "Literature"
        menu:
          - text: "Citation List"
            href: literature.qmd
          - text: "Citation Network"
            href: network.qmd
      - text: "Slides"
        href: presentations.qmd
    right:
      - icon: github
        href: https://github.com/peettr/tcbl-review
  page-footer:
    center: |
      © 2025 Liang Hu & Ahsan Kareem | 
      [DOI: 10.1016/j.awe.2025.100097](https://doi.org/10.1016/j.awe.2025.100097)
  
format:
  html:
    theme:
      light: cosmo
      dark:
        - darkly
        - styles-dark.css
    css: styles.css
    toc: true
    toc-depth: 4
    number-sections: true
    number-depth: 4
    smooth-scroll: true
    grid:
      body-width: 1000px
      sidebar-width: 250px
      margin-width: 250px
    code-fold: true
    # bibliography: references.bib
    link-external-newwindow: true
    include-after-body: 
      - _includes/layout-fix.html
      - _includes/hypothesis.html
      - _includes/chatbot.html
      - _includes/inline-edit.html
      - _includes/comments.html
      - _includes/lang-toggle.html
      - _includes/mobile-toc.html

execute:
  freeze: auto
